<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>card</title>

<style>
body{
margin:0;
padding:0;
background:#000;
}

img{
width:100%;
height:100vh;
object-fit:contain;
display:block;
}
</style>

</head>

<body>

<img id="card" src="90.jpg">

<script>

// گرفتن ماه از لینک
const urlParams = new URLSearchParams(window.location.search);
let linkMonth = parseInt(urlParams.get("month"));

// تاریخ فعلی
const today = new Date();

// تبدیل تاریخ به شمسی
const formatter = new Intl.DateTimeFormat('fa-IR-u-nu-latn',{
year:'numeric',
month:'numeric',
day:'numeric'
});

const parts = formatter.formatToParts(today);

let year,month,day;

for(let p of parts){
if(p.type==="year") year=parseInt(p.value);
if(p.type==="month") month=parseInt(p.value);
if(p.type==="day") day=parseInt(p.value);
}

// فقط سال 1405 معتبر
if(year === 1405){

// اگر لینک ماه معتبر باشد
if(linkMonth >= 1 && linkMonth <= 12){

// اگر ماه فعلی برابر باشد
if(linkMonth === month){
document.getElementById("card").src = linkMonth + ".jpg";
}else{
document.getElementById("card").src = "90.jpg";
}

}else{
document.getElementById("card").src = "90.jpg";
}

}else{

document.getElementById("card").src = "90.jpg";

}

</script>

</body>
</html>
